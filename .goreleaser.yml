version: 2

project_name: ngent

before:
  hooks:
    # Build the embedded frontend before compiling the Go binary.
    - make build-web

builds:
  - id: ngent
    main: ./cmd/ngent
    binary: ngent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: binary
    name_template: "{{ .ProjectName }}-{{ .Tag }}-{{ if eq .Arch \"arm64\" }}aarch64{{ else if eq .Arch \"amd64\" }}x86_64{{ else }}{{ .Arch }}{{ end }}-{{ .Os }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      # Only include the binary, no other files
      - none*

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Tag }}-source"
  format: tar.gz

checksum:
  name_template: "{{ .ProjectName }}-{{ .Tag }}-checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
